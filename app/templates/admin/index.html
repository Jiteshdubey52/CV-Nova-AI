{% extends "base.html" %}{% block content %}<section class="shell"><h1>Admin dashboard</h1><div class="mt-6 grid gap-4 md:grid-cols-4">{% for key, value in stats.items() %}<div class="metric"><span>{{ key|title }}</span><strong>{{ value }}</strong></div>{% endfor %}</div><div class="panel mt-6"><h2>Recent users</h2>{% for user in users %}<div class="row"><span>{{ user.name }}</span><span>{{ user.email }}</span></div>{% endfor %}</div></section>{% endblock %}
