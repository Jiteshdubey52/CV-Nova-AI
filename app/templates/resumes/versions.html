{% extends "base.html" %}{% block content %}<section class="shell"><h1>Version history</h1><div class="mt-6 space-y-3">{% for version in resume.versions %}<div class="row"><span>{{ version.label }} · {{ version.created_at.strftime('%Y-%m-%d %H:%M') }}</span><strong>{{ version.ats_score }}%</strong></div>{% else %}<p>No saved versions yet.</p>{% endfor %}</div></section>{% endblock %}
