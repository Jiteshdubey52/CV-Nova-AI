{% extends "base.html" %}{% block content %}<section class="shell"><h1>Cover letter generator</h1><p class="mt-3 text-slate-600">Paste the job description and CVNova AI will create a targeted, professional cover letter.</p><form method="post" class="panel mt-6"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><textarea class="input min-h-52" name="job_description" placeholder="Paste job description"></textarea><button class="btn-primary mt-4">Generate cover letter</button></form>{% if output %}<pre class="panel mt-6 whitespace-pre-wrap">{{ output }}</pre>{% endif %}</section>{% endblock %}
