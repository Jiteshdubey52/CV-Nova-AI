{% extends "base.html" %}
{% block content %}<section class="shell"><div class="mb-6 flex items-center justify-between"><h1>Resumes</h1><div class="flex gap-2"><a class="btn-secondary" href="{{ url_for('resumes.templates') }}">Templates</a><a class="btn-primary" href="{{ url_for('resumes.new') }}">New resume</a></div></div><div class="grid gap-4 md:grid-cols-2">{% for resume in resumes %}<article class="panel"><div class="flex items-center justify-between"><h2>{{ resume.title }}</h2><span>{{ resume.ats_score }}%</span></div><p>{{ resume.target_role }}</p><div class="mt-4 flex flex-wrap gap-2"><a class="btn-secondary" href="{{ url_for('resumes.detail', resume_id=resume.id) }}">Open</a><a class="btn-secondary" href="{{ url_for('resumes.downloads', resume_id=resume.id) }}">Download</a><a class="btn-secondary" href="{{ url_for('resumes.export', resume_id=resume.id, kind='pdf') }}">PDF</a><a class="btn-secondary" href="{{ url_for('resumes.export', resume_id=resume.id, kind='docx') }}">DOCX</a></div></article>{% else %}<p>No resumes yet.</p>{% endfor %}</div></section>{% endblock %}
