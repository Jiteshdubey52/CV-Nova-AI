{% extends "base.html" %}
{% block content %}<section class="shell"><div class="mb-6 flex items-center justify-between"><h1>Resumes</h1><a class="btn-primary" href="{{ url_for('resumes.new') }}">New resume</a></div><div class="grid gap-4 md:grid-cols-2">{% for resume in resumes %}<article class="panel"><div class="flex items-center justify-between"><h2>{{ resume.title }}</h2><span>{{ resume.ats_score }}%</span></div><p>{{ resume.target_role }}</p><a class="btn-secondary mt-4" href="{{ url_for('resumes.detail', resume_id=resume.id) }}">Open</a></article>{% else %}<p>No resumes yet.</p>{% endfor %}</div></section>{% endblock %}
