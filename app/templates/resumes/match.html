{% extends "base.html" %}{% block content %}<section class="shell"><h1>Job description match</h1><form method="post" class="panel mt-6"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><textarea class="input min-h-52" name="job_description" placeholder="Paste job description"></textarea><button class="btn-primary mt-4">Analyze match</button></form>{% if result %}<div class="panel mt-6"><h2>{{ result.score }}% match</h2><p><strong>Matched:</strong> {{ result.matched|join(', ') }}</p><p><strong>Improve with:</strong> {{ result.missing|join(', ') }}</p></div>{% endif %}</section>{% endblock %}
