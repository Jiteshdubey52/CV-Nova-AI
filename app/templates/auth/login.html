{% extends "base.html" %}
{% block content %}<section class="auth-card"><h1>Welcome back</h1><form method="post">{{ form.hidden_tag() }}{{ form.email(class="input", placeholder="Email") }}{{ form.password(class="input", placeholder="Password") }}<label class="flex gap-2 text-sm">{{ form.remember() }} Remember me</label>{{ form.submit(class="btn-primary w-full") }}</form><a href="{{ url_for('auth.google_login') }}" class="btn-secondary w-full justify-center">Continue with Google</a><p><a href="{{ url_for('auth.reset_request') }}">Forgot password?</a></p></section>{% endblock %}
