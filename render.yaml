services:
  - type: web
    name: cvnova-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask --app app:create_app db upgrade
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cvnova-ai-db
          property: connectionString
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: cvnova-ai-db
    plan: free
