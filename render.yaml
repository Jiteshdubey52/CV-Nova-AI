services:
  - type: web
    name: cvnova-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: flask --app app:create_app db upgrade && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cvnova-ai-db
          property: connectionString
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_BASE_URL
        value: https://cvnova-ai.onrender.com

databases:
  - name: cvnova-ai-db
    plan: free
